<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Auto Doc Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          colors: {
            shell: {
              950: '#07111f',
              900: '#0f1c2f',
              800: '#1a2b42',
              700: '#274260',
            }
          }
        }
      }
    };
    if (localStorage.getItem('autodoc-theme') === 'light') {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }

    function openArtifactModal() {
      const modal = document.getElementById('artifact-preview-modal');
      if (!modal) return;
      modal.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeArtifactModal() {
      const modal = document.getElementById('artifact-preview-modal');
      if (!modal) return;
      modal.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeArtifactModal();
      }
    });
  </script>
</head>

<body class="min-h-full bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div class="min-h-screen lg:grid lg:grid-cols-[260px_minmax(0,1fr)]">
    <aside
      class="border-b border-slate-200 bg-white/90 px-6 py-5 dark:border-slate-800 dark:bg-shell-900 lg:border-b-0 lg:border-r">
      <div class="flex items-center justify-between lg:block">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-teal-600 dark:text-teal-300">Internal Tool
          </p>
          <h1 class="mt-2 text-xl font-semibold">Auto Doc Admin</h1>
          <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Operational dashboard for generation, publishing,
            and run history.</p>
        </div>
        <button type="button" class="rounded-md border border-slate-300 px-3 py-2 text-sm dark:border-slate-700"
          onclick="document.documentElement.classList.toggle('dark'); localStorage.setItem('autodoc-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');">
          Theme
        </button>
      </div>
      <nav class="mt-8 space-y-2">
        <a href="/admin"
          class="block rounded-lg px-3 py-2 text-sm {% if active_path == '/admin' %}bg-teal-600 text-white{% else %}text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-shell-800{% endif %}">Dashboard</a>
        <a href="/admin/repositories"
          class="block rounded-lg px-3 py-2 text-sm {% if active_path.startswith('/admin/repositories') %}bg-teal-600 text-white{% else %}text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-shell-800{% endif %}">Repositories</a>
        <a href="/admin/runs"
          class="block rounded-lg px-3 py-2 text-sm {% if active_path.startswith('/admin/runs') %}bg-teal-600 text-white{% else %}text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-shell-800{% endif %}">Run
          History</a>
      </nav>
      <div
        class="mt-8 rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm dark:border-slate-800 dark:bg-shell-800/70">
        <p class="font-medium">Signed in as</p>
        <p class="mt-1 text-slate-600 dark:text-slate-300">{{ admin_user }}</p>
        <p class="mt-3 text-xs uppercase tracking-[0.18em] text-slate-400 dark:text-slate-500">Database</p>
        <p class="mt-1 break-all text-xs text-slate-500 dark:text-slate-400">{{ database_label }}</p>
        <form method="post" action="/admin/logout" class="mt-4">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button
            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 dark:border-slate-700 dark:text-slate-200">Sign
            out</button>
        </form>
      </div>
    </aside>
    <main class="px-4 py-6 sm:px-6 lg:px-10">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div id="artifact-preview-modal" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-slate-950/70" onclick="closeArtifactModal()"></div>
    <div class="relative flex min-h-full items-center justify-center p-4">
      <div class="max-h-[85vh] w-full max-w-5xl overflow-hidden rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200 dark:bg-shell-900 dark:ring-slate-800">
        <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-slate-800">
          <h2 class="text-lg font-semibold">Artifact preview</h2>
          <button type="button" class="rounded-lg border border-slate-300 px-3 py-2 text-sm dark:border-slate-700" onclick="closeArtifactModal()">Close</button>
        </div>
        <div id="artifact-preview-body" class="max-h-[calc(85vh-5rem)] overflow-y-auto p-6 text-sm text-slate-900 dark:text-slate-100">
          <p class="text-slate-500 dark:text-slate-400">Select a log to preview it here.</p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
